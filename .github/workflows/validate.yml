name: Validate resource pack

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Rebuild pack
        run: python scripts/build_pack.py
      - name: Validate pack
        run: python scripts/validate_pack.py
      - name: Verify reproducible output
        run: git diff --exit-code
